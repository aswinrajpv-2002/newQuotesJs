<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title>popup</title>
     <!-- <link rel="preconnect" href="https://fonts.googleapis.com"> -->
    <style>
    
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

    .popup-container{
        background-color: #f5ef9c;
        height:100vh;
        width: 100vw;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Montserrat';
        gap: 10px;
    }
    .popup-quote {
      font-size: 1.5em;
      text-align: center;
      margin-bottom: 20px;
      font-weight: 700;
      
    }
    .popup-author {
      font-style: italic;
      color: #333;
    }
    </style>
</head>
<body>
    <div class="popup-container">
        <div id="popup-quote"></div>
        <div id="popup-author"></div>
    </div>
    

    <script>
    const popupquote = localStorage.getItem("popup_quote");
    const popupauthor = localStorage.getItem("popup_author");

    document.getElementById("popup-quote").textContent = popupquote;
    document.getElementById("popup-author").textContent = popupauthor;
    </script>
    
    
</body>
</html>
